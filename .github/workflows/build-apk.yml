name: APK 빌드

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JDK 17 설정
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Android Command-line Tools 설치
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
          -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d /tmp/
        mv /tmp/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

        echo "ANDROID_HOME=$HOME/android-sdk"    >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

    - name: SDK 라이선스 동의 및 플랫폼 설치
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Gradle 8.0 설치
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt/gradle
        echo "/opt/gradle/gradle-8.0/bin" >> $GITHUB_PATH

    - name: Gradle Wrapper 생성
      working-directory: android_app
      run: |
        gradle wrapper --gradle-version=8.0 --distribution-type=bin
        chmod +x gradlew

    - name: APK 빌드
      working-directory: android_app
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: APK 업로드
      uses: actions/upload-artifact@v4
      with:
        name: SNS전문가-앱-debug
        path: android_app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

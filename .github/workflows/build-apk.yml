name: APK 빌드

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JDK 17 설정
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Android SDK 설정
      uses: android-actions/setup-android@v3

    - name: Android 34 플랫폼 및 빌드툴 설치
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Gradle 8.0 설치
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.0'

    - name: Gradle Wrapper 생성
      working-directory: android_app
      run: |
        gradle wrapper --gradle-version=8.0 --distribution-type=bin
        chmod +x gradlew

    - name: Debug APK 빌드
      working-directory: android_app
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: APK 업로드 (다운로드 가능)
      uses: actions/upload-artifact@v4
      with:
        name: SNS전문가-앱-debug
        path: android_app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
